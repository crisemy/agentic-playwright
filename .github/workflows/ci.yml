# .github/workflows/ci.yml
name: Playwright POM Tests - Multi-Browser CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Test on ${{ matrix.browser }} (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
        python-version: ['3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install ${{ matrix.browser }} --with-deps

      - name: Create necessary directories
        run: mkdir -p screenshots auth reports

      - name: Run tests on ${{ matrix.browser }}
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        run: |
          pytest \
            --browser ${{ matrix.browser }} \
            --html=reports/report-${{ matrix.browser }}.html \
            --self-contained-html \
            -v

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: reports/
          retention-days: 14