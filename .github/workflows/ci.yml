# .github/workflows/ci.yml
name: Playwright CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    name: Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install ${{ matrix.browser }} --with-deps

      - name: Create directories
        run: mkdir -p screenshots auth reports

      - name: Run pytest suite
        env:
          HEADLESS: true
          SLOW_MO: 0
        run: |
          pytest -n auto --browser ${{ matrix.browser }} --html=reports/pytest-${{ matrix.browser }}.html -q

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-report-${{ matrix.browser }}
          path: reports/
          retention-days: 14

  agentic-swarm:
    name: Agentic Swarm (manual)
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Create directories
        run: mkdir -p screenshots auth reports

      - name: Run Agentic CrewAI Swarm
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          HEADLESS: true
          SLOW_MO: 0
        run: |
          python -m agents.testing_crew
